<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Acharya Tutors</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
    /* Basic CSS */
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:Segoe UI,Tahoma,sans-serif;background:#0a1628;color:#fff;min-height:100vh}
    .sidebar{position:fixed;left:0;top:0;width:220px;height:100vh;background:#0d1b2a;padding:20px 0;border-right:1px solid #1b3a5c}
    .nav-item{padding:15px 25px;cursor:pointer;color:#b0c4de;display:flex;align-items:center;gap:10px}
    .nav-item.active{background:#1b3a5c;color:#fff;border-left:3px solid #00d4ff}
    .main-content{margin-left:220px;padding:40px}
    .section{display:none}
    .section.active{display:block}
    .cards-container{display:flex;flex-wrap:wrap;justify-content:center;gap:20px}
    .card{background:#0d1b2a;border:1px solid #1b3a5c;border-radius:16px;padding:30px;width:300px;text-align:center;cursor:pointer}
    .card:hover{border-color:#00d4ff}
    .card-icon{font-size:30px;margin-bottom:15px;color:#00d4ff}
    .form-container{max-width:600px;margin:0 auto;background:#0d1b2a;padding:30px;border-radius:16px}
    .submit-btn{width:100%;padding:12px;background:linear-gradient(135deg,#00d4ff,#7b2cbf);border:none;color:white;cursor:pointer;border-radius:8px;margin-top:10px}
</style>
</head>
<body>

<div class="sidebar">
    <div style="text-align:center; padding:20px;"><h1>ACHARYA</h1></div>
    <div class="nav-item active" onclick="showSection('home')"><i class="fas fa-home"></i> Home</div>
    <div class="nav-item" onclick="showSection('find-tutor')"><i class="fas fa-search"></i> Find Tutor</div>
    <div class="nav-item" onclick="showSection('become-tutor')"><i class="fas fa-chalkboard-teacher"></i> Become a Tutor</div>
    <div class="nav-item" onclick="showSection('worksheet')"><i class="fas fa-file-alt"></i> Worksheets</div>
    <div class="nav-item" onclick="showSection('contact')"><i class="fas fa-phone"></i> Contact Us</div>
</div>

<div class="main-content">
    <div id="home" class="section active">
        <div class="cards-container">
            <div class="card" onclick="showSection('find-tutor')"><div class="card-icon"><i class="fas fa-search"></i></div><h3>Find a Tutor</h3></div>
            <div class="card" onclick="showSection('become-tutor')"><div class="card-icon"><i class="fas fa-chalkboard-teacher"></i></div><h3>Become a Tutor</h3></div>
            <div class="card" onclick="showSection('worksheet')"><div class="card-icon"><i class="fas fa-file-alt"></i></div><h3>Worksheets</h3></div>
        </div>
    </div>

    <div id="find-tutor" class="section">
        <div class="form-container"><h2>Find a Tutor</h2><form><input type="text" placeholder="Name" style="width:100%;padding:10px;margin:10px 0;"><button class="submit-btn">Apply</button></form></div>
    </div>

    <div id="become-tutor" class="section">
        <div class="form-container"><h2>Become a Tutor</h2><form><input type="text" placeholder="Name" style="width:100%;padding:10px;margin:10px 0;"><button class="submit-btn">Apply</button></form></div>
    </div>

    <div id="worksheet" class="section">
        <div class="form-container"><h2>Worksheets</h2><p>Request subject-wise worksheets here.</p></div>
    </div>

    <div id="contact" class="section">
        <div class="form-container"><h2>Contact Us</h2><p>+91 9196393002</p></div>
    </div>
</div>

<script>
    function showSection(id) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        event.currentTarget.classList.add('active');
    }
</script>
</body>
</html>
