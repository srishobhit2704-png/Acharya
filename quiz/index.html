<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Force Chapter Ultimate Quiz</title>

<style>

body{
    margin:0;
    padding:20px;
    font-family:Arial, sans-serif;
    background:linear-gradient(to right,#dfe9f3,#ffffff);
}

.container{
    max-width:1000px;
    margin:auto;
    background:white;
    padding:25px;
    border-radius:15px;
    box-shadow:0 0 15px rgba(0,0,0,0.15);
}

h1{
    text-align:center;
    color:#0b4f9c;
}

input{
    width:100%;
    padding:12px;
    margin-top:10px;
    border-radius:8px;
    border:1px solid #ccc;
    font-size:16px;
}

button{
    padding:12px 20px;
    border:none;
    border-radius:8px;
    background:#0b4f9c;
    color:white;
    font-size:16px;
    cursor:pointer;
    margin-top:20px;
}

button:hover{
    background:#08366b;
}

.question-box{
    margin-top:25px;
    padding:20px;
    border-radius:12px;
    background:#fafafa;
    border:1px solid #ddd;
    position:relative;
    overflow:hidden;
}

.question-type{
    color:#777;
    font-size:14px;
    margin-bottom:10px;
}

.question{
    font-size:19px;
    margin-bottom:15px;
    line-height:1.6;
}

.option{
    display:block;
    background:#eeeeee;
    margin:10px 0;
    padding:12px;
    border-radius:8px;
    cursor:pointer;
    transition:0.3s;
}

.option:hover{
    background:#d8e8ff;
}

.correct{
    background:#9cffb1 !important;
}

.wrong{
    background:#ff9c9c !important;
    animation:shake 0.4s;
}

@keyframes shake{
    0%{transform:translateX(0);}
    25%{transform:translateX(-5px);}
    50%{transform:translateX(5px);}
    75%{transform:translateX(-5px);}
    100%{transform:translateX(0);}
}

.blast{
    position:absolute;
    font-size:40px;
    animation:explode 0.8s forwards;
}

@keyframes explode{
    0%{
        opacity:1;
        transform:scale(0.5);
    }
    100%{
        opacity:0;
        transform:scale(3);
    }
}

.praise{
    color:green;
    font-weight:bold;
    margin-top:10px;
    animation:pop 0.5s;
}

@keyframes pop{
    0%{
        transform:scale(0.5);
    }
    100%{
        transform:scale(1);
    }
}

#quiz,
#submitBtn,
#reportCard{
    display:none;
}

.report-card{
    margin-top:30px;
    padding:25px;
    border-radius:15px;
    background:#f5faff;
    border:2px solid #0b4f9c;
}

.report-card h2{
    color:#0b4f9c;
}

.grade{
    font-size:26px;
    font-weight:bold;
    margin-top:10px;
}

</style>

</head>

<body>

<div class="container">

<h1>Force Chapter Ultimate Quiz</h1>

<!-- =========================
STUDENT FORM
========================= -->

<div id="studentForm">

    <h2>Student Details</h2>

    <input type="text" id="studentName" placeholder="Enter Name">

    <input type="text" id="studentClass" placeholder="Enter Class">

    <input type="text" id="studentSchool" placeholder="Enter School Name">

    <input type="text" id="studentMobile" placeholder="Enter Mobile Number">

    <button onclick="startQuiz()">
        Start Quiz
    </button>

</div>

<!-- =========================
QUIZ
========================= -->

<div id="quiz"></div>

<button id="submitBtn" onclick="submitQuiz()">
    Submit Quiz
</button>

<!-- =========================
REPORT CARD
========================= -->

<div id="reportCard" class="report-card"></div>

</div>

<script>

/* =====================================================
UNIQUE QUESTION BANK
===================================================== */

const questionBank = [

{
type:"MCQ",
question:"A bus suddenly stops. Passengers move forward due to:",
options:["Momentum","Friction","Gravity","Pressure"],
answer:"Momentum"
},

{
type:"MCQ",
question:"Which force keeps planets revolving around the Sun?",
options:["Magnetic Force","Gravitational Force","Electrostatic Force","Muscular Force"],
answer:"Gravitational Force"
},

{
type:"MCQ",
question:"Which law explains rocket propulsion?",
options:["Newton's First Law","Newton's Second Law","Newton's Third Law","Law of Gravitation"],
answer:"Newton's Third Law"
},

{
type:"MCQ",
question:"What happens to friction on polishing surfaces?",
options:["Increases","Decreases","Remains same","Becomes zero"],
answer:"Decreases"
},

{
type:"MCQ",
question:"Which quantity changes when force acts on a body?",
options:["Momentum","Density","Temperature","Volume"],
answer:"Momentum"
},

{
type:"True False",
question:"Balanced forces can change the shape of an object.",
options:["True","False"],
answer:"True"
},

{
type:"True False",
question:"Weight remains same everywhere.",
options:["True","False"],
answer:"False"
},

{
type:"True False",
question:"Friction always opposes motion.",
options:["True","False"],
answer:"True"
},

{
type:"True False",
question:"Momentum is a scalar quantity.",
options:["True","False"],
answer:"False"
},

{
type:"Fill in the Blanks",
question:"The SI unit of force is ______.",
options:["Newton","Joule","Pascal","Watt"],
answer:"Newton"
},

{
type:"Fill in the Blanks",
question:"Force = Mass × ______.",
options:["Velocity","Acceleration","Distance","Pressure"],
answer:"Acceleration"
},

{
type:"Fill in the Blanks",
question:"The tendency to resist change is called ______.",
options:["Inertia","Velocity","Pressure","Density"],
answer:"Inertia"
},

{
type:"Assertion Reason",
question:"Assertion: Friction produces heat.<br><br>Reason: Friction opposes motion.",
options:[
"Both true and reason is correct explanation",
"Both true but reason is not correct explanation",
"Assertion true but reason false",
"Assertion false but reason true"
],
answer:"Both true and reason is correct explanation"
},

{
type:"Assertion Reason",
question:"Assertion: Heavier objects have greater inertia.<br><br>Reason: Inertia depends on mass.",
options:[
"Both true and reason is correct explanation",
"Both true but reason is not correct explanation",
"Assertion true but reason false",
"Assertion false but reason true"
],
answer:"Both true and reason is correct explanation"
}

];

/* =====================================================
CREATE MORE UNIQUE QUESTIONS
===================================================== */

const extraConcepts = [
"Impulse",
"Pressure",
"Air Resistance",
"Centripetal Force",
"Static Friction",
"Kinetic Friction",
"Rolling Friction",
"Action Reaction",
"Balanced Force",
"Unbalanced Force"
];

for(let i=0;i<186;i++){

    let concept = extraConcepts[i % extraConcepts.length];

    questionBank.push({

        type:"MCQ",

        question:`Advanced Question ${i+1}: Which statement is correct about ${concept}?`,

        options:[
        `${concept} affects motion`,
        `${concept} destroys matter`,
        `${concept} creates energy`,
        `${concept} stops gravity`
        ],

        answer:`${concept} affects motion`

    });

}

/* =====================================================
RANDOM 50 QUESTIONS
===================================================== */

function shuffle(array){

    for(let i=array.length-1;i>0;i--){

        const j=Math.floor(Math.random()*(i+1));

        [array[i],array[j]]=[array[j],array[i]];
    }

    return array;
}

const quizQuestions = shuffle([...questionBank]).slice(0,50);

/* =====================================================
START QUIZ
===================================================== */

function startQuiz(){

    let name=document.getElementById("studentName").value;
    let className=document.getElementById("studentClass").value;
    let school=document.getElementById("studentSchool").value;
    let mobile=document.getElementById("studentMobile").value;

    if(
        name==="" ||
        className==="" ||
        school==="" ||
        mobile===""
    ){

        alert("Please fill all details");
        return;
    }

    document.getElementById("studentForm").style.display="none";

    document.getElementById("quiz").style.display="block";

    document.getElementById("submitBtn").style.display="inline-block";

    loadQuiz();

}

/* =====================================================
LOAD QUIZ
===================================================== */

const praiseWords=[
"Excellent!",
"Great Job!",
"Outstanding!",
"Superb!",
"Fantastic!",
"Brilliant!"
];

function loadQuiz(){

    const quiz=document.getElementById("quiz");

    quiz.innerHTML="";

    quizQuestions.forEach((q,index)=>{

        let html=`

        <div class="question-box" id="box${index}">

            <div class="question-type">
                ${q.type}
            </div>

            <div class="question">
                Q${index+1}. ${q.question}
            </div>

        `;

        q.options.forEach(option=>{

            html+=`

            <label class="option">

                <input
                    type="radio"
                    name="q${index}"
                    value="${option}"
                    onclick="checkAnswer(${index},this,'${q.answer}')"
                >

                ${option}

            </label>

            `;

        });

        html+=`

        <div id="feedback${index}"></div>

        </div>
        `;

        quiz.innerHTML+=html;

    });

}

/* =====================================================
CHECK ANSWER
===================================================== */

function checkAnswer(index,element,correctAnswer){

    let feedback=document.getElementById(`feedback${index}`);

    feedback.innerHTML="";

    let parent=element.parentElement;

    if(element.value===correctAnswer){

        parent.classList.add("correct");

        let praise=praiseWords[
            Math.floor(Math.random()*praiseWords.length)
        ];

        feedback.innerHTML=`
        <div class="praise">
            ✅ ${praise}
        </div>
        `;

    }

    else{

        parent.classList.add("wrong");

        let blast=document.createElement("div");

        blast.className="blast";

        blast.innerHTML="💥";

        parent.appendChild(blast);

        setTimeout(()=>{
            blast.remove();
        },800);

    }

}

/* =====================================================
SUBMIT QUIZ
===================================================== */

function submitQuiz(){

    let score=0;

    quizQuestions.forEach((q,index)=>{

        let selected=document.querySelector(
            `input[name="q${index}"]:checked`
        );

        if(selected && selected.value===q.answer){

            score++;

        }

    });

    let grade="";

    if(score>=45){
        grade="A+";
    }
    else if(score>=40){
        grade="A";
    }
    else if(score>=30){
        grade="B";
    }
    else if(score>=20){
        grade="C";
    }
    else{
        grade="Needs Improvement";
    }

    let studentName=document.getElementById("studentName").value;

    document.getElementById("reportCard").style.display="block";

    document.getElementById("reportCard").innerHTML=`

    <h2>Final Report Card</h2>

    <p><strong>Name:</strong> ${studentName}</p>

    <p><strong>Total Questions:</strong> 50</p>

    <p><strong>Correct Answers:</strong> ${score}</p>

    <p><strong>Wrong Answers:</strong> ${50-score}</p>

    <p><strong>Percentage:</strong> ${score*2}%</p>

    <div class="grade">
        Grade: ${grade}
    </div>

    `;

    window.scrollTo(0,document.body.scrollHeight);

}

</script>

</body>
</html>
