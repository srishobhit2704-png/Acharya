```html
<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Force Chapter Mega Quiz</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, sans-serif;
    background:linear-gradient(135deg,#dfe9f3,#ffffff);
    padding:20px;
}

.container{
    max-width:1100px;
    margin:auto;
    background:white;
    border-radius:20px;
    padding:25px;
    box-shadow:0 0 20px rgba(0,0,0,0.15);
}

h1{
    text-align:center;
    color:#0b4f9c;
    margin-bottom:20px;
}

h2{
    color:#0b4f9c;
    margin-bottom:15px;
}

input{
    width:100%;
    padding:14px;
    margin-top:12px;
    border-radius:10px;
    border:1px solid #ccc;
    font-size:16px;
}

button{
    padding:14px 25px;
    border:none;
    border-radius:10px;
    background:#0b4f9c;
    color:white;
    font-size:17px;
    cursor:pointer;
    margin-top:20px;
    transition:0.3s;
}

button:hover{
    background:#08366b;
}

#quiz,
#submitBtn,
#reportCard{
    display:none;
}

.top-bar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:20px;
    flex-wrap:wrap;
}

.timer{
    background:#ffeb3b;
    padding:10px 18px;
    border-radius:10px;
    font-weight:bold;
    font-size:18px;
}

.progress-container{
    width:100%;
    height:20px;
    background:#ddd;
    border-radius:10px;
    overflow:hidden;
    margin-top:15px;
}

.progress-bar{
    height:100%;
    width:0%;
    background:#0b4f9c;
    transition:0.3s;
}

.question-box{
    margin-top:25px;
    background:#fafafa;
    border:1px solid #ddd;
    border-radius:15px;
    padding:20px;
    position:relative;
    overflow:hidden;
}

.question-number{
    background:#0b4f9c;
    color:white;
    display:inline-block;
    padding:6px 12px;
    border-radius:8px;
    margin-bottom:10px;
    font-size:14px;
}

.question-type{
    color:#666;
    margin-bottom:10px;
}

.question{
    font-size:20px;
    margin-bottom:15px;
    line-height:1.6;
}

.option{
    display:block;
    background:#eeeeee;
    padding:14px;
    margin:10px 0;
    border-radius:10px;
    cursor:pointer;
    transition:0.3s;
    font-size:16px;
}

.option:hover{
    background:#d8e8ff;
    transform:scale(1.02);
}

.correct{
    background:#9cffb1 !important;
}

.wrong{
    background:#ff9c9c !important;
    animation:shake 0.4s;
}

@keyframes shake{
    0%{transform:translateX(0);}
    25%{transform:translateX(-5px);}
    50%{transform:translateX(5px);}
    75%{transform:translateX(-5px);}
    100%{transform:translateX(0);}
}

.feedback{
    margin-top:12px;
    font-size:20px;
    font-weight:bold;
}

.firework{
    position:absolute;
    width:20px;
    height:20px;
    border-radius:50%;
    background:gold;
    animation:explode 0.8s forwards;
}

@keyframes explode{
    0%{
        transform:scale(0);
        opacity:1;
    }
    100%{
        transform:scale(8);
        opacity:0;
    }
}

.blast{
    position:absolute;
    font-size:45px;
    animation:blastAnim 0.8s forwards;
}

@keyframes blastAnim{
    0%{
        transform:scale(0.5);
        opacity:1;
    }
    100%{
        transform:scale(3);
        opacity:0;
    }
}

.report-card{
    margin-top:30px;
    background:#f5faff;
    border:2px solid #0b4f9c;
    border-radius:15px;
    padding:25px;
}

.grade{
    font-size:30px;
    color:#0b4f9c;
    margin-top:15px;
    font-weight:bold;
}

.rank{
    margin-top:10px;
    font-size:22px;
    color:#ff9800;
    font-weight:bold;
}

@media(max-width:768px){

    .question{
        font-size:18px;
    }

    .option{
        font-size:15px;
    }

}

</style>

</head>

<body>

<div class="container">

<h1>🔥 Force Chapter Mega Quiz 🔥</h1>

<div id="studentForm">

    <h2>Student Details</h2>

    <input type="text" id="studentName" placeholder="Enter Your Name">

    <input type="text" id="studentClass" placeholder="Enter Your Class">

    <input type="text" id="studentSchool" placeholder="Enter School Name">

    <input type="text" id="studentMobile" placeholder="Enter Mobile Number">

    <button onclick="startQuiz()">
        Start Quiz
    </button>

</div>

<div id="quizSection">

<div class="top-bar">

<div class="timer">
⏳ Time Left: <span id="time">30:00</span>
</div>

<div>
Answered:
<span id="answeredCount">0</span>/50
</div>

</div>

<div class="progress-container">
<div class="progress-bar" id="progressBar"></div>
</div>

<div id="quiz"></div>

<button id="submitBtn" onclick="submitQuiz()">
Submit Quiz
</button>

</div>

<div id="reportCard" class="report-card"></div>

</div>

<script>

/* =========================================
QUESTION BANK
========================================= */

const questionBank = [

{
type:"MCQ",
question:"A bus suddenly stops. Passengers move forward due to:",
options:["Momentum","Friction","Gravity","Pressure"],
answer:"Momentum"
},

{
type:"MCQ",
question:"Which force keeps planets revolving around the Sun?",
options:["Magnetic Force","Gravitational Force","Electrostatic Force","Muscular Force"],
answer:"Gravitational Force"
},

{
type:"MCQ",
question:"Seat belts are used because of:",
options:["Friction","Inertia","Pressure","Velocity"],
answer:"Inertia"
},

{
type:"MCQ",
question:"Which friction is minimum?",
options:["Static Friction","Sliding Friction","Rolling Friction","Fluid Friction"],
answer:"Rolling Friction"
},

{
type:"MCQ",
question:"Newton's Third Law is related to:",
options:["Action-Reaction","Momentum","Gravity","Pressure"],
answer:"Action-Reaction"
},

{
type:"MCQ",
question:"The SI unit of force is:",
options:["Newton","Joule","Pascal","Watt"],
answer:"Newton"
},

{
type:"MCQ",
question:"Force = Mass × ?",
options:["Velocity","Acceleration","Pressure","Distance"],
answer:"Acceleration"
},

{
type:"MCQ",
question:"Why do athletes bend before running?",
options:["To sleep","To gain momentum","To reduce weight","To reduce pressure"],
answer:"To gain momentum"
},

{
type:"MCQ",
question:"A cricket player pulls his hands backward while catching ball to:",
options:["Increase force","Decrease time","Increase time","Increase speed"],
answer:"Increase time"
},

{
type:"MCQ",
question:"Which force helps us walk?",
options:["Gravity","Magnetism","Friction","Pressure"],
answer:"Friction"
}

];

/* =========================================
AUTO GENERATE GOOD QUESTIONS
========================================= */

const concepts = [
"Inertia",
"Momentum",
"Friction",
"Balanced Force",
"Unbalanced Force",
"Gravity",
"Pressure",
"Acceleration",
"Action Reaction",
"Air Resistance"
];

for(let i=1;i<=190;i++){

    let concept = concepts[i % concepts.length];

    questionBank.push({

        type:"MCQ",

        question:`Q${i}: Which statement is true about ${concept}?`,

        options:[
        `${concept} affects motion`,
        `${concept} creates matter`,
        `${concept} destroys energy`,
        `${concept} stops gravity`
        ],

        answer:`${concept} affects motion`

    });

}

/* =========================================
VARIABLES
========================================= */

let quizQuestions = [];

let streak = 0;

let answered = 0;

let timer;

let totalSeconds = 1800;

/* =========================================
SHUFFLE
========================================= */

function shuffle(array){

    for(let i=array.length-1;i>0;i--){

        const j=Math.floor(Math.random()*(i+1));

        [array[i],array[j]]=[array[j],array[i]];

    }

    return array;

}

/* =========================================
START QUIZ
========================================= */

function startQuiz(){

    let name=document.getElementById("studentName").value;

    let className=document.getElementById("studentClass").value;

    let school=document.getElementById("studentSchool").value;

    let mobile=document.getElementById("studentMobile").value;

    if(
        name==="" ||
        className==="" ||
        school==="" ||
        mobile===""
    ){

        alert("Please Fill All Details");

        return;

    }

    quizQuestions = shuffle([...questionBank]).slice(0,50);

    document.getElementById("studentForm").style.display="none";

    document.getElementById("quiz").style.display="block";

    document.getElementById("submitBtn").style.display="inline-block";

    loadQuiz();

    startTimer();

}

/* =========================================
LOAD QUIZ
========================================= */

function loadQuiz(){

    const quiz=document.getElementById("quiz");

    quiz.innerHTML="";

    quizQuestions.forEach((q,index)=>{

        let html=`

        <div class="question-box">

        <div class="question-number">
        Question ${index+1}
        </div>

        <div class="question-type">
        ${q.type}
        </div>

        <div class="question">
        ${q.question}
        </div>

        `;

        q.options.forEach(option=>{

            html+=`

            <label class="option">

            <input
            type="radio"
            name="q${index}"
            value="${option}"
            onclick="checkAnswer(${index},this,'${q.answer}')"
            >

            ${option}

            </label>

            `;

        });

        html+=`

        <div id="feedback${index}" class="feedback"></div>

        </div>

        `;

        quiz.innerHTML+=html;

    });

}

/* =========================================
CHECK ANSWER
========================================= */

function checkAnswer(index,element,correctAnswer){

    const feedback=document.getElementById(`feedback${index}`);

    feedback.innerHTML="";

    const parent=element.parentElement;

    document.querySelectorAll(`input[name="q${index}"]`)
    .forEach(el=>{

        el.disabled=true;

    });

    answered++;

    document.getElementById("answeredCount").innerText=answered;

    document.getElementById("progressBar").style.width=
    (answered/50)*100 + "%";

    if(element.value===correctAnswer){

        streak++;

        parent.classList.add("correct");

        const praiseWords=[

        "🔥 Excellent!",
        "🚀 Outstanding!",
        "🏆 Brilliant!",
        "⚡ Superb!",
        "🎯 Perfect!",
        "👑 Legend!",
        "💥 Amazing!",
        "🔥 Great Job!"

        ];

        let praise=
        praiseWords[Math.floor(Math.random()*praiseWords.length)];

        let special="";

        if(streak===3){

            special="<br>🔥 HATTRICK!";

        }

        if(streak===5){

            special="<br>👑 UNSTOPPABLE!";

        }

        feedback.innerHTML=
        praise + special;

        const fire=document.createElement("div");

        fire.className="firework";

        parent.appendChild(fire);

        setTimeout(()=>{

            fire.remove();

        },800);

    }

    else{

        streak=0;

        parent.classList.add("wrong");

        feedback.innerHTML=
        "❌ Wrong Answer";

        const blast=document.createElement("div");

        blast.className="blast";

        blast.innerHTML="💥";

        parent.appendChild(blast);

        setTimeout(()=>{

            blast.remove();

        },800);

    }

}

/* =========================================
TIMER
========================================= */

function startTimer(){

    timer=setInterval(()=>{

        totalSeconds--;

        let minutes=
        Math.floor(totalSeconds/60);

        let seconds=
        totalSeconds%60;

        if(seconds<10){

            seconds="0"+seconds;

        }

        document.getElementById("time")
        .innerText=
        minutes+":"+seconds;

        if(totalSeconds<=0){

            clearInterval(timer);

            submitQuiz();

        }

    },1000);

}

/* =========================================
SUBMIT QUIZ
========================================= */

function submitQuiz(){

    clearInterval(timer);

    let score=0;

    quizQuestions.forEach((q,index)=>{

        const selected=document.querySelector(
        `input[name="q${index}"]:checked`
        );

        if(selected &&
        selected.value===q.answer){

            score++;

        }

    });

    let grade="";
    let rank="";

    if(score>=45){

        grade="A+";
        rank="🏆 Topper";

    }

    else if(score>=40){

        grade="A";
        rank="🔥 Excellent";

    }

    else if(score>=30){

        grade="B";
        rank="👍 Very Good";

    }

    else if(score>=20){

        grade="C";
        rank="🙂 Good";

    }

    else{

        grade="Needs Improvement";
        rank="📚 Practice More";

    }

    let studentName=
    document.getElementById("studentName").value;

    document.getElementById("reportCard")
    .style.display="block";

    document.getElementById("reportCard")
    .innerHTML=`

    <h2>🎓 Final Report Card</h2>

    <p><strong>Name:</strong> ${studentName}</p>

    <p><strong>Total Questions:</strong> 50</p>

    <p><strong>Correct Answers:</strong> ${score}</p>

    <p><strong>Wrong Answers:</strong> ${50-score}</p>

    <p><strong>Percentage:</strong> ${score*2}%</p>

    <div class="grade">
    Grade: ${grade}
    </div>

    <div class="rank">
    ${rank}
    </div>

    `;

    window.scrollTo(0,document.body.scrollHeight);

}

</script>

</body>
</html>
```
