function startQuiz(){const cls=classSelect.value,subject=subjectSelect.value,type=typeSelect.value,time=parseInt(timeSelect.value);let qs=quizData[cls][subject]||[];if(type!=='all')qs=qs.filter(q=>q.type===type);currentQuestions=shuffleArray(qs).slice(0,25);userAnswers=new Array(currentQuestions.length).fill(null);currentQuestionIndex=0;setupScreen.classList.add('hidden');resultScreen.classList.add('hidden');quizScreen.classList.remove('hidden');quizInfo.textContent=`Class ${cls} | ${subject.toUpperCase()} | ${currentQuestions.length} Questions`;if(timerInterval)clearInterval(timerInterval);timeLeft=time*60;if(time>0){timerInterval=setInterval(updateTimer,1000);updateTimer();}else timer.textContent='No Limit';showQuestion();}
function updateTimer(){let m=Math.floor(timeLeft/60),s=timeLeft%60;timer.textContent=`${m}:${String(s).padStart(2,'0')}`;if(timeLeft<=0){clearInterval(timerInterval);finishQuiz();}timeLeft--;}
function showQuestion(){const q=currentQuestions[currentQuestionIndex];const badge=q.type==='mcq'?'MCQ':q.type==='tf'?'True/False':'Reason & Assertion';let h=`<div class="qbox"><span class="pill">Question ${currentQuestionIndex+1} of ${currentQuestions.length}</span><span class="pill">${badge}</span><div class="qtext">${q.q}</div>`;if(q.type==='mcq'||q.type==='ar')q.options.forEach((op,i)=>h+=`<label class="option ${userAnswers[currentQuestionIndex]===i?'selected':''}" onclick="selectAnswer(${i})">○ ${op}</label>`);else [['True',true],['False',false]].forEach(x=>h+=`<label class="option ${userAnswers[currentQuestionIndex]===x[1]?'selected':''}" onclick="selectAnswer(${x[1]})">○ ${x[0]}</label>`);h+='</div>';questionContainer.innerHTML=h;prevBtn.disabled=currentQuestionIndex===0;nextBtn.textContent=currentQuestionIndex===currentQuestions.length-1?'FINISH':'NEXT →';progressBar.style.width=((currentQuestionIndex+1)/currentQuestions.length*100)+'%';}
function selectAnswer(a){userAnswers[currentQuestionIndex]=a;showQuestion();}
function nextQuestion(){if(currentQuestionIndex<currentQuestions.length-1){currentQuestionIndex++;showQuestion();}else finishQuiz();}
function prevQuestion(){if(currentQuestionIndex>0){currentQuestionIndex--;showQuestion();}}
function finishQuiz(){if(timerInterval)clearInterval(timerInterval);let c=0;currentQuestions.forEach((q,i)=>{if(userAnswers[i]===q.a)c++;});let t=currentQuestions.length,p=Math.round(c/t*100);quizScreen.classList.add('hidden');resultScreen.classList.remove('hidden');scoreCircle.textContent=`${c}/${t}`;correctCount.textContent=c;wrongCount.textContent=t-c;percentage.textContent=p+'%';resultMessage.textContent=p>=80?'Excellent!':p>=50?'Good Try!':'Practice More!';}
function showReview(){reviewSection.classList.remove('hidden');reviewContainer.innerHTML=currentQuestions.map((q,i)=>`<div class="review"><b>Q${i+1}. ${q.q}</b><br>Your: ${userAnswers[i]===null?'Not answered':((q.type==='mcq'||q.type==='ar')?q.options[userAnswers[i]]:userAnswers[i])}<br>Correct: ${(q.type==='mcq'||q.type==='ar')?q.options[q.a]:q.a}<br><small>${q.exp}</small></div>`).join('');}
function restartQuiz(){if(timerInterval)clearInterval(timerInterval);resultScreen.classList.add('hidden');quizScreen.classList.add('hidden');setupScreen.classList.remove('hidden');}
</script></body></html>
