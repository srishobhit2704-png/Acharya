<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Mega Quiz Portal</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --primary: #4a00e0;
            --secondary: #8e2de2;
            --success: #00b894;
            --danger: #d63031;
            --dark: #2d3436;
            --light: #f5f6fa;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: var(--dark);
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 800px;
            padding: 30px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        h1 {
            text-align: center;
            color: var(--primary);
            margin-bottom: 20px;
        }

        .screen {
            display: none;
        }

        .screen.active {
            display: block;
        }

        /* Form Controls */
        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #555;
        }

        select {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            outline: none;
            transition: 0.3s;
        }

        select:focus {
            border-color: var(--primary);
        }

        button {
            width: 100%;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            color: white;
            border: none;
            padding: 15px;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
            transition: transform 0.2s, opacity 0.2s;
        }

        button:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }

        /* Quiz Area */
        .quiz-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #eee;
            font-weight: bold;
        }

        .question-box {
            font-size: 20px;
            margin-bottom: 20px;
            font-weight: 600;
            line-height: 1.5;
        }

        .options-container {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
        }

        .option-btn {
            background: #f8f9fa;
            border: 2px solid #e9ecef;
            text-align: left;
            padding: 15px;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.2s;
            color: var(--dark);
        }

        .option-btn:hover {
            background: #e2e8f0;
            border-color: #cbd5e1;
        }

        /* Feedback Effects */
        .correct-anim {
            background-color: var(--success) !important;
            color: white !important;
            border-color: var(--success) !important;
            animation: pop 0.4s ease-in-out;
        }

        .wrong-anim {
            background-color: var(--danger) !important;
            color: white !important;
            border-color: var(--danger) !important;
            animation: shake 0.4s ease-in-out;
        }

        /* Blast effect cover */
        .blast-effect {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(214, 48, 49, 0.4);
            display: none;
            justify-content: center;
            align-items: center;
            font-size: 80px;
            z-index: 10;
            animation: flash 0.3s ease-out;
        }

        /* Appreciation Popup */
        .appreciation {
            text-align: center;
            font-size: 24px;
            font-weight: bold;
            color: var(--success);
            margin-top: 15px;
            height: 30px;
        }

        /* Analysis Screen */
        .analysis-card {
            background: #f8f9fa;
            border-left: 5px solid var(--primary);
            padding: 15px;
            margin-top: 15px;
            border-radius: 0 10px 10px 0;
        }

        .score-big {
            font-size: 48px;
            text-align: center;
            color: var(--primary);
            font-weight: bold;
            margin: 20px 0;
        }

        /* Animations */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-10px); }
            40%, 80% { transform: translateX(10px); }
        }

        @keyframes pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        @keyframes flash {
            0% { opacity: 0; }
            50% { opacity: 1; }
            100% { opacity: 0; }
        }
    </style>
</head>

<div class="container" id="quiz-container">
    <div class="blast-effect" id="blast-screen">💥 BLAST!</div>

    <div id="screen-select" class="screen active">
        <h1>Smart Quiz Portal</h1>

        </div>

        <div class="form-group">

                <option value="Maths">Mathematics</option>
            </select>
        </div>

        <div class="form-group">
            <label>Select Topic</label>
            <select id="select-topic">
                </select>
        </div>

        <button onclick="startQuiz()">Start Challenging Quiz</button>
    </div>

    <div id="screen-quiz" class="screen">
        <div class="quiz-header">
            <span id="quiz-progress">Question 1 of 5</span>
            <span id="quiz-board-tag" style="color:var(--primary)">CBSE</span>
        </div>
        
        <div class="question-box" id="question-text">

        </div>

        <div class="options-container" id="options-box">
            </div>

        <div class="appreciation" id="appreciation-text"></div>
        <button id="next-btn" style="display:none;" onclick="nextQuestion()">Next Question</button>
    </div>

    <div id="screen-analysis" class="screen">
        <h1>Quiz Performance Analysis</h1>
        <div class="score-big" id="final-score">0/0</div>
        
        <div id="analysis-remarks" style="text-align:center; font-size:18px; margin-bottom:20px; font-weight:bold;"></div>
        
        <h3>Detailed Breakdown:</h3>
        <div id="analysis-details">
            </div>

        <button onclick="resetQuiz()">Try Another Quiz</button>
    </div>
</div>

// Topics Mapping
const topicMap = {
    "4_Science": ["Plants", "Animals", "Human Body"],
    "4_Maths": ["Numbers", "Addition", "Fractions"],
    "9_Science": ["Motion", "Atoms", "Cell Structure"],
    "9_Maths": ["Algebra", "Geometry"],
    "10_Science": ["Light", "Electricity", "Chemical Reactions"],
    "10_Maths": ["Trigonometry", "Quadratic Equations"],
    "12_Science": ["Electrostatics", "Organic Chemistry", "Optics"],
    "12_Maths": ["Calculus", "Matrices", "Probability"]
};

// Words of Appreciation
const goodWords = ["Fantastic! 🎉", "Brilliant! 🌟", "Awesome Job! 🚀", "You Rock! 😎", "Genius! 🧠", "Perfect! 💯"];

// App State Variables
let currentQuestions = [];
let currentIndex = 0;
let score = 0;
let userAnswers = [];

// Initialize Topics
function updateTopics() {
    const cls = document.getElementById("select-class").value;
    const sub = document.getElementById("select-subject").value;
    const key = `${cls}_${sub}`;
    const topicSelect = document.getElementById("select-topic");
    
    topicSelect.innerHTML = "";
    const topics = topicMap[key] || ["General Topic"];
    
    topics.forEach(t => {
        let opt = document.createElement("option");
        opt.value = t;
        opt.innerText = t;
        topicSelect.appendChild(opt);
    });
}

// Start Quiz Logic
function startQuiz() {
    const board = document.getElementById("select-board").value;
    const cls = document.getElementById("select-class").value;
    const sub = document.getElementById("select-subject").value;
    const topic = document.getElementById("select-topic").value;

    // Filter questions based on selection
    currentQuestions = questionBank.filter(q => q.class === cls && q.subject === sub && q.topic === topic);

    // Fallback: If specific filtered question is missing, fetch general category to keep it running
    if(currentQuestions.length === 0) {
        currentQuestions = questionBank.filter(q => q.class === cls && q.subject === sub);
    }
    if(currentQuestions.length === 0) {
        // Ultimate fallback sample if database doesn't have it yet
        currentQuestions = [
            { board: board, type: "MCQ", question: `Sample Question for Class ${cls} ${topic} (${board}): Multi-choice test?`, options: ["Option A (Correct)", "Option B", "Option C", "Option D"], answer: "Option A (Correct)" }
        ];
    }

    currentIndex = 0;
    score = 0;
    userAnswers = [];
    
    switchScreen("screen-quiz");
    showQuestion();
}

function showQuestion() {
    document.getElementById("next-btn").style.display = "none";
    document.getElementById("appreciation-text").innerText = "";
    
    let q = currentQuestions[currentIndex];
    document.getElementById("quiz-progress").innerText = `Question ${currentIndex + 1} of ${currentQuestions.length}`;
    document.getElementById("quiz-board-tag").innerText = `${q.board} Format (${q.type})`;
    document.getElementById("question-text").innerText = q.question;

    const optionsBox = document.getElementById("options-box");
    optionsBox.innerHTML = "";

    q.options.forEach(opt => {
        let btn = document.createElement("button");
        btn.className = "option-btn";
        btn.innerText = opt;
        btn.onclick = () => checkAnswer(btn, opt, q.answer);
        optionsBox.appendChild(btn);
    });
}

function checkAnswer(selectedBtn, chosen, correct) {
    // Disable all option buttons after answer selection
    const buttons = document.querySelectorAll(".option-btn");
    buttons.forEach(b => b.disabled = true);

    userAnswers.push({
        question: currentQuestions[currentIndex].question,
        chosen: chosen,
        correct: correct
    });

    if (chosen === correct) {
        // RIGHT ANSWER
        score++;
        selectedBtn.classList.add("correct-anim");
        
        // Random Appreciation text
        const randomWord = goodWords[Math.floor(Math.random() * goodWords.length)];
        document.getElementById("appreciation-text").innerText = randomWord;
        
        // Confetti Burst Effect
        confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } });
    } else {
        // WRONG ANSWER
        selectedBtn.classList.add("wrong-anim");
        
        // Find and highlight correct answer too
        buttons.forEach(b => {
            if(b.innerText === correct) b.classList.add("correct-anim");
        });

        // Blast Screen Overlay Effect
        const blast = document.getElementById("blast-screen");
        blast.style.display = "flex";
        setTimeout(() => { blast.style.display = "none"; }, 400);
    }

    document.getElementById("next-btn").style.display = "block";
}

function nextQuestion() {
    currentIndex++;
    if (currentIndex < currentQuestions.length) {
        showQuestion();
    } else {
        showAnalysis();
    }
}

// Analysis & Results Screen
function showAnalysis() {
    switchScreen("screen-analysis");
    document.getElementById("final-score").innerText = `${score} / ${currentQuestions.length}`;
    
    let percent = (score / currentQuestions.length) * 100;
    let remarks = "";
    if(percent === 100) remarks = "Mastermind! Perfect score! 🏆";
    else if(percent >= 70) remarks = "Great job! Your concepts are solid! 👍";
    else remarks = "Keep learning! Practice makes perfect. 📚";
    
    document.getElementById("analysis-remarks").innerText = remarks;

    const detailsBox = document.getElementById("analysis-details");
    detailsBox.innerHTML = "";

    userAnswers.forEach((item, index) => {
        let card = document.createElement("div");
        card.className = "analysis-card";
        card.style.borderLeftColor = (item.chosen === item.correct) ? "var(--success)" : "var(--danger)";
        
        card.innerHTML = `
            <p><strong>Q${index+1}:</strong> ${item.question}</p>
            <p style="margin-top:5px;">Your Answer: <span style="color:${item.chosen === item.correct ? 'green':'red'}">${item.chosen}</span></p>
            ${item.chosen !== item.correct ? `<p>Correct Answer: <span style="color:green">${item.correct}</span></p>` : ''}
        `;
        detailsBox.appendChild(card);
    });
}

function resetQuiz() {
    switchScreen("screen-select");
}

function switchScreen(screenId) {
    document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
    document.getElementById(screenId).classList.add("active");
}

// Initial Run
updateTopics();
</script>
