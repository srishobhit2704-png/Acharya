<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎓 EduQuiz Pro - Class 4-12</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
            animation: fadeInDown 0.8s ease;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        .card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            margin-bottom: 20px;
            animation: fadeInUp 0.8s ease;
        }

        .setup-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
            font-size: 0.95rem;
        }

        select, input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 1rem;
            transition: all 0.3s ease;
            background: #f8f9fa;
        }

        select:focus, input:focus {
            outline: none;
            border-color: #667eea;
            background: white;
        }

        .btn {
            display: inline-block;
            padding: 14px 35px;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
            margin-left: 10px;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
        }

        .btn-success {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
        }

        .btn-danger {
            background: linear-gradient(135deg, #eb3349 0%, #f45c43 100%);
            color: white;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: #e0e0e0;
            border-radius: 10px;
            margin-bottom: 25px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            border-radius: 10px;
            transition: width 0.5s ease;
        }

        .question-card {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 20px;
            border-left: 5px solid #667eea;
        }

        .question-number {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 15px;
        }

        .question-text {
            font-size: 1.15rem;
            color: #333;
            margin-bottom: 20px;
            line-height: 1.6;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option {
            display: flex;
            align-items: center;
            padding: 15px 20px;
            background: white;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .option:hover {
            border-color: #667eea;
            background: #f0f4ff;
        }

        .option.selected {
            border-color: #667eea;
            background: #e8eeff;
        }

        .option.correct {
            border-color: #28a745;
            background: #d4edda;
        }

        .option.wrong {
            border-color: #dc3545;
            background: #f8d7da;
        }

        .option input {
            width: auto;
            margin-right: 12px;
            cursor: pointer;
        }

        .assertion-box {
            background: #e3f2fd;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 10px;
            border-left: 4px solid #2196f3;
        }

        .reason-box {
            background: #fff3e0;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 15px;
            border-left: 4px solid #ff9800;
        }

        .timer {
            text-align: center;
            font-size: 1.5rem;
            font-weight: 700;
            color: #667eea;
            margin-bottom: 20px;
        }

        .timer.warning {
            color: #ff6b6b;
            animation: pulse 1s infinite;
        }

        .result-card {
            text-align: center;
            padding: 40px;
        }

        .score-circle {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 30px;
            color: white;
            font-size: 3rem;
            font-weight: 700;
            box-shadow: 0 10px 40px rgba(102, 126, 234, 0.4);
        }

        .result-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin: 30px 0;
        }

        .stat-box {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 15px;
        }

        .stat-box h3 {
            font-size: 2rem;
            color: #667eea;
        }

        .stat-box p {
            color: #666;
            font-size: 0.9rem;
        }

        .explanation {
            background: #e8f5e9;
            padding: 15px;
            border-radius: 10px;
            margin-top: 15px;
            border-left: 4px solid #4caf50;
            display: none;
        }

        .explanation.show {
            display: block;
        }

        .hidden {
            display: none !important;
        }

        .badge {
            display: inline-block;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            margin-left: 10px;
        }

        .badge-mcq { background: #e3f2fd; color: #1976d2; }
        .badge-tf { background: #fce4ec; color: #c2185b; }
        .badge-ar { background: #fff3e0; color: #e65100; }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .navigation {
            display: flex;
            justify-content: space-between;
            margin-top: 25px;
        }

        .review-item {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 15px;
            text-align: left;
        }

        .review-item.correct-ans {
            border-left: 5px solid #28a745;
        }

        .review-item.wrong-ans {
            border-left: 5px solid #dc3545;
        }

        @media (max-width: 600px) {
            .header h1 { font-size: 1.8rem; }
            .setup-grid { grid-template-columns: 1fr; }
            .result-stats { grid-template-columns: 1fr; }
            .card { padding: 20px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>🎓 EduQuiz Pro</h1>
            <p>Master Science & Math | Class 4 to 12</p>
        </div>

        <!-- Setup Screen -->
        <div id="setupScreen" class="card">
            <h2 style="margin-bottom: 25px; color: #333; text-align: center;">⚙️ Quiz Setup</h2>
            <div class="setup-grid">
                <div class="form-group">
                    <label>📚 Select Class</label>
                    <select id="classSelect">
                        <option value="4">Class 4</option>
                        <option value="5">Class 5</option>
                        <option value="6">Class 6</option>
                        <option value="7">Class 7</option>
                        <option value="8">Class 8</option>
                        <option value="9">Class 9</option>
                        <option value="10">Class 10</option>
                        <option value="11">Class 11</option>
                        <option value="12">Class 12</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>🔬 Select Subject</label>
                    <select id="subjectSelect">
                        <option value="math">Mathematics</option>
                        <option value="physics">Physics</option>
                        <option value="chemistry">Chemistry</option>
                        <option value="biology">Biology</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>📝 Question Types</label>
                    <select id="typeSelect">
                        <option value="all">All Types (MCQ + T/F + A/R)</option>
                        <option value="mcq">Multiple Choice Only</option>
                        <option value="tf">True/False Only</option>
                        <option value="ar">Assertion-Reason Only</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>⏱️ Time Limit (minutes)</label>
                    <select id="timeSelect">
                        <option value="15">15 minutes</option>
                        <option value="20">20 minutes</option>
                        <option value="25" selected>25 minutes</option>
                        <option value="30">30 minutes</option>
                        <option value="0">No Limit</option>
                    </select>
                </div>
            </div>
            <div style="text-align: center;">
                <button class="btn btn-primary" onclick="startQuiz()">🚀 Start Quiz</button>
            </div>
        </div>

        <!-- Quiz Screen -->
        <div id="quizScreen" class="card hidden">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                <span id="quizInfo" style="font-weight: 600; color: #667eea;"></span>
                <div class="timer" id="timer">25:00</div>
            </div>
            <div class="progress-bar">
                <div class="progress-fill" id="progressBar" style="width: 0%"></div>
            </div>
            <div id="questionContainer"></div>
            <div class="navigation">
                <button class="btn btn-secondary" id="prevBtn" onclick="prevQuestion()" disabled>← Previous</button>
                <button class="btn btn-primary" id="nextBtn" onclick="nextQuestion()">Next →</button>
            </div>
        </div>

        <!-- Result Screen -->
        <div id="resultScreen" class="card hidden">
            <div class="result-card">
                <h2 style="margin-bottom: 20px; color: #333;">🎯 Quiz Complete!</h2>
                <div class="score-circle" id="scoreCircle">0/25</div>
                <div class="result-stats">
                    <div class="stat-box">
                        <h3 id="correctCount">0</h3>
                        <p>✅ Correct</p>
                    </div>
                    <div class="stat-box">
                        <h3 id="wrongCount">0</h3>
                        <p>❌ Wrong</p>
                    </div>
                    <div class="stat-box">
                        <h3 id="percentage">0%</h3>
                        <p>📊 Percentage</p>
                    </div>
                </div>
                <p id="resultMessage" style="font-size: 1.2rem; margin-bottom: 20px;"></p>
                <div style="margin-bottom: 20px;">
                    <button class="btn btn-success" onclick="showReview()">📋 Review Answers</button>
                    <button class="btn btn-primary" onclick="restartQuiz()">🔄 New Quiz</button>
                </div>
            </div>
            <div id="reviewSection" class="hidden" style="margin-top: 30px; text-align: left;">
                <h3 style="margin-bottom: 20px; color: #333;">📖 Answer Review</h3>
                <div id="reviewContainer"></div>
            </div>
        </div>
    </div>

    
<script>
const quizData = {};
const subjects = ['math','physics','chemistry','biology'];

function makeQuestions(cls, subject){
  const names = {
    math: 'Mathematics',
    physics: 'Physics',
    chemistry: 'Chemistry',
    biology: 'Biology'
  };
  return [
    {type:'mcq', q:`Class ${cls} ${names[subject]}: What is 2 + 2?`, options:['3','4','5','6'], a:1, exp:'2 + 2 = 4'},
    {type:'tf', q:`Class ${cls} ${names[subject]}: The Sun gives us light.`, a:true, exp:'Sun is a natural source of light.'},
    {type:'mcq', q:`Class ${cls} ${names[subject]}: Which option is correct?`, options:['A','B','C','D'], a:0, exp:'Option A is correct for this sample question.'},
    {type:'tf', q:`Class ${cls} ${names[subject]}: A triangle has 4 sides.`, a:false, exp:'A triangle has 3 sides.'},
    {type:'mcq', q:`Class ${cls} ${names[subject]}: How many minutes are in 1 hour?`, options:['30','45','60','90'], a:2, exp:'1 hour = 60 minutes.'}
  ];
}
for(let c=4;c<=12;c++){
  quizData[c] = {};
  subjects.forEach(s => quizData[c][s] = makeQuestions(c,s));
}

let currentQuestions = [];
let currentQuestionIndex = 0;
let userAnswers = [];
let timerInterval = null;
let timeLeft = 0;

function startQuiz(){
  const cls = document.getElementById('classSelect').value;
  const subject = document.getElementById('subjectSelect').value;
  const type = document.getElementById('typeSelect').value;
  const time = parseInt(document.getElementById('timeSelect').value);

  let questions = (quizData[cls] && quizData[cls][subject]) ? quizData[cls][subject] : [];
  if(type !== 'all') questions = questions.filter(q => q.type === type);

  if(!questions.length){
    alert('Is class/subject/type me question nahi mila.');
    return;
  }

  currentQuestions = questions;
  currentQuestionIndex = 0;
  userAnswers = new Array(currentQuestions.length).fill(null);

  document.getElementById('setupScreen').classList.add('hidden');
  document.getElementById('resultScreen').classList.add('hidden');
  document.getElementById('quizScreen').classList.remove('hidden');

  document.getElementById('quizInfo').textContent =
    `Class ${cls} | ${subject.toUpperCase()} | ${currentQuestions.length} Questions`;

  if(timerInterval) clearInterval(timerInterval);
  if(time > 0){
    timeLeft = time * 60;
    timerInterval = setInterval(updateTimer, 1000);
    updateTimer();
  } else {
    document.getElementById('timer').textContent = 'No Limit';
  }

  showQuestion();
}

function updateTimer(){
  const min = Math.floor(timeLeft / 60);
  const sec = timeLeft % 60;
  const timer = document.getElementById('timer');
  timer.textContent = `${min}:${sec.toString().padStart(2,'0')}`;
  timer.classList.toggle('warning', timeLeft <= 60);
  if(timeLeft <= 0){
    clearInterval(timerInterval);
    finishQuiz();
  }
  timeLeft--;
}

function showQuestion(){
  const q = currentQuestions[currentQuestionIndex];
  const box = document.getElementById('questionContainer');
  const badge = q.type === 'mcq' ? 'MCQ' : q.type === 'tf' ? 'True/False' : 'A/R';

  let html = `<div class="question-card">
    <span class="question-number">Question ${currentQuestionIndex + 1} of ${currentQuestions.length}</span>
    <span class="badge badge-${q.type}">${badge}</span>
    <div class="question-text">${q.q}</div>
    <div class="options">`;

  if(q.type === 'mcq'){
    q.options.forEach((op, i) => {
      const selected = userAnswers[currentQuestionIndex] === i ? 'selected' : '';
      html += `<label class="option ${selected}" onclick="selectAnswer(${i})">
        <input type="radio" name="answer" ${selected ? 'checked' : ''}> ${op}
      </label>`;
    });
  } else {
    [['True', true], ['False', false]].forEach(([op, val]) => {
      const selected = userAnswers[currentQuestionIndex] === val ? 'selected' : '';
      html += `<label class="option ${selected}" onclick="selectAnswer(${val})">
        <input type="radio" name="answer" ${selected ? 'checked' : ''}> ${op}
      </label>`;
    });
  }

  html += `</div></div>`;
  box.innerHTML = html;

  document.getElementById('prevBtn').disabled = currentQuestionIndex === 0;
  document.getElementById('nextBtn').textContent =
    currentQuestionIndex === currentQuestions.length - 1 ? 'Finish Quiz' : 'Next →';
  document.getElementById('progressBar').style.width =
    `${((currentQuestionIndex + 1) / currentQuestions.length) * 100}%`;
}

function selectAnswer(ans){
  userAnswers[currentQuestionIndex] = ans;
  showQuestion();
}

function nextQuestion(){
  if(currentQuestionIndex < currentQuestions.length - 1){
    currentQuestionIndex++;
    showQuestion();
  } else {
    finishQuiz();
  }
}

function prevQuestion(){
  if(currentQuestionIndex > 0){
    currentQuestionIndex--;
    showQuestion();
  }
}

function finishQuiz(){
  if(timerInterval) clearInterval(timerInterval);
  let correct = 0;
  currentQuestions.forEach((q, i) => {
    if(userAnswers[i] === q.a) correct++;
  });

  const total = currentQuestions.length;
  const wrong = total - correct;
  const percent = Math.round((correct / total) * 100);

  document.getElementById('quizScreen').classList.add('hidden');
  document.getElementById('resultScreen').classList.remove('hidden');

  document.getElementById('scoreCircle').textContent = `${correct}/${total}`;
  document.getElementById('correctCount').textContent = correct;
  document.getElementById('wrongCount').textContent = wrong;
  document.getElementById('percentage').textContent = percent + '%';
  document.getElementById('resultMessage').textContent =
    percent >= 80 ? 'Excellent!' : percent >= 50 ? 'Good Try!' : 'Practice More!';
}

function showReview(){
  const review = document.getElementById('reviewSection');
  const box = document.getElementById('reviewContainer');
  review.classList.remove('hidden');

  box.innerHTML = currentQuestions.map((q, i) => {
    const ok = userAnswers[i] === q.a;
    const your = userAnswers[i] === null ? 'Not answered' :
      (q.type === 'mcq' ? q.options[userAnswers[i]] : userAnswers[i]);
    const correct = q.type === 'mcq' ? q.options[q.a] : q.a;
    return `<div class="review-item ${ok ? 'correct-ans' : 'wrong-ans'}">
      <b>Q${i+1}. ${q.q}</b><br>
      Your Answer: ${your}<br>
      Correct Answer: ${correct}<br>
      <small>${q.exp || ''}</small>
    </div>`;
  }).join('');
}

function restartQuiz(){
  if(timerInterval) clearInterval(timerInterval);
  document.getElementById('resultScreen').classList.add('hidden');
  document.getElementById('quizScreen').classList.add('hidden');
  document.getElementById('setupScreen').classList.remove('hidden');
}
</script>
</body>
</html>
